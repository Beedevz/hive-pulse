# git-cliff — changelog generator config
# Conventional commits: https://www.conventionalcommits.org

[changelog]
header = ""
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/{{ remote.github.owner }}/{{ remote.github.repo }}/commit/{{ commit.id }}))
{%- endfor %}
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_preprocessors = []
commit_parsers = [
  { message = "^feat\\(adapter\\)", group = "🔌 New Adapters" },
  { message = "^feat",              group = "🚀 New Features" },
  { message = "^fix",               group = "🐛 Bug Fixes" },
  { message = "^perf",              group = "⚡ Performance" },
  { message = "^refactor",          group = "♻️ Refactor" },
  { message = "^docs",              group = "📖 Documentation" },
  { message = "^chore\\(deps\\)",   group = "📦 Dependencies" },
  { message = "^chore",             group = "🔧 Maintenance",  skip = true },
  { message = "^ci",                group = "🔧 Maintenance",  skip = true },
]
protect_breaking_commits = false
filter_commits = true
tag_pattern = "v[0-9]*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"

[remote.github]
owner = "Beedevz"
repo = "hivepulse"
