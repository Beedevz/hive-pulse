name: Bug Report
description: Report a bug or unexpected behavior in HivePulse
title: "fix: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below as completely as possible.

  - type: input
    id: version
    attributes:
      label: HivePulse version
      description: Run `docker inspect beedevztech/hive --format '{{.Config.Labels}}'` or check the GitHub Release tag.
      placeholder: "e.g. v1.2.0"
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment method
      options:
        - Docker Compose (default)
        - Helm / Kubernetes
        - Binary (built from source)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any relevant Docker logs (`docker compose logs hivepulse-api`) or screenshots.
      render: shell

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, browser (if UI bug), PostgreSQL version, any relevant env vars (redact secrets).
      placeholder: |
        - OS: Ubuntu 22.04
        - Browser: Chrome 124
        - PostgreSQL: 16.2
