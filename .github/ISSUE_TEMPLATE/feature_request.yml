name: Feature Request
description: Suggest a new feature or improvement for HivePulse
title: "feat: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, check the [roadmap](https://github.com/Beedevz/hivepulse#roadmap) to see if this is already planned.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Monitoring engine (new check type, interval, retry logic)
        - Notification system (new channel, trigger rules)
        - Dashboard / UI
        - Status page
        - Authentication / RBAC
        - API / Swagger
        - Helm chart / deployment
        - Performance / scalability
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or use case. "I'm frustrated when..." is a great start.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work? Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you ruled them out.

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I am willing to open a PR for this feature
