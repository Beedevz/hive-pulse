version: 2

updates:
  # Go modules
  - package-ecosystem: gomod
    directory: /hivepulse-api
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies

  # npm (frontend)
  - package-ecosystem: npm
    directory: /hivepulse-web
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    commit-message:
      prefix: "chore(ci)"
    labels:
      - dependencies
      - ci
